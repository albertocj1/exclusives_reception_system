<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Exclusives PH — Reception</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: { extend: {
        fontFamily: { serif: ['Fraunces','serif'], sans: ['Archivo','sans-serif'], mono: ['Space Mono','monospace'] },
        colors: { brand: {
          obsidian:'#0A1A24', slate:'#102A38', gold:'#F5C518',
          goldDim:'rgba(245,197,24,0.15)', ice:'#F2EADD', muted:'#8AA0AD'
        }}
      }}
    }
  </script>
  <style>
    #reader { border-radius: 18px; overflow: hidden; }
    #reader video { border-radius: 18px; }
    .tab-btn.active-tab { background:#F5C518; color:#0A1A24; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  </style>

  <!-- ==========================================================
       CONFIG — fill these three in with YOUR values
       ========================================================== -->
  <script>
    window.SUPABASE_URL     = "https://gvtutnofyrkmyyclfshe.supabase.co";   // <-- your Project URL
    window.SUPABASE_ANON_KEY = "sb_publishable_rapJHCk_P68ZgPDnqEPY7w_GfAv2ag4";              // <-- your anon/public key (safe in frontend)
    window.API_BASE          = "https://exclusivesph.onrender.com"; // <-- your Render backend
  </script>
</head>
<body class="bg-brand-obsidian text-brand-ice font-sans antialiased min-h-screen">

  <!-- ================= LOGIN GATE ================= -->
  <div id="gate" class="min-h-screen flex items-center justify-center px-6">
    <div class="w-full max-w-sm bg-brand-slate border border-white/5 rounded-3xl p-8">
      <div class="text-center mb-6">
        <div class="font-mono text-[11px] tracking-[0.3em] text-brand-gold uppercase mb-1">Exclusives PH</div>
        <h1 class="font-serif text-2xl text-brand-ice">Reception</h1>
      </div>
      <label class="block font-mono text-[10px] tracking-widest text-brand-muted uppercase mb-2">Email</label>
      <input id="email" type="email" autocomplete="username" placeholder="reception@exclusivesph.com"
             class="w-full bg-brand-obsidian border border-white/10 rounded-xl focus:border-brand-gold text-brand-ice text-sm px-4 py-3 outline-none mb-4">
      <label class="block font-mono text-[10px] tracking-widest text-brand-muted uppercase mb-2">Password</label>
      <input id="password" type="password" autocomplete="current-password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;"
             class="w-full bg-brand-obsidian border border-white/10 rounded-xl focus:border-brand-gold text-brand-ice text-sm px-4 py-3 outline-none mb-5">
      <button id="login-btn" class="w-full py-3 rounded-full bg-brand-gold text-brand-obsidian font-mono text-xs font-bold tracking-widest uppercase hover:bg-brand-ice transition-colors">Log in</button>
      <p id="gate-error" class="text-red-400 text-xs font-mono mt-3 hidden"></p>
    </div>
  </div>

  <!-- ================= APP ================= -->
  <div id="app" class="hidden max-w-lg mx-auto px-4 py-6">

    <!-- Header -->
    <div class="flex items-center justify-between mb-5">
      <div>
        <div class="font-mono text-[10px] tracking-[0.3em] text-brand-gold uppercase">Exclusives PH</div>
        <h1 class="font-serif text-2xl text-brand-ice leading-tight">Reception</h1>
      </div>
      <button id="logout-btn" class="font-mono text-[10px] tracking-widest uppercase text-brand-muted hover:text-brand-ice border border-white/10 rounded-full px-3 py-2 transition-colors">Log out</button>
    </div>

    <!-- Tabs -->
    <div class="flex gap-2 mb-5">
      <button data-tab="scan" class="tab-btn active-tab flex-1 font-mono text-[11px] tracking-widest uppercase rounded-full px-4 py-3 border border-brand-gold transition-colors">Scan</button>
      <button data-tab="tables" class="tab-btn flex-1 font-mono text-[11px] tracking-widest uppercase rounded-full px-4 py-3 border border-white/10 text-brand-muted transition-colors">Tables</button>
    </div>

    <!-- ---------- SCAN TAB ---------- -->
    <div id="tab-scan">
      <div class="bg-brand-slate border border-white/5 rounded-3xl p-5 mb-4">
        <div id="reader" class="w-full bg-brand-obsidian aspect-square flex items-center justify-center text-brand-muted text-xs font-mono">
          Camera off
        </div>
        <div class="flex gap-2 mt-4">
          <button id="cam-start" class="flex-1 font-mono text-[11px] tracking-widest uppercase rounded-full px-4 py-3 bg-brand-goldDim border border-brand-gold/40 text-brand-gold hover:bg-brand-gold hover:text-brand-obsidian transition-colors">Start camera</button>
          <button id="cam-stop" class="hidden flex-1 font-mono text-[11px] tracking-widest uppercase rounded-full px-4 py-3 border border-white/10 text-brand-muted hover:text-brand-ice transition-colors">Stop</button>
        </div>
      </div>

      <!-- Manual entry -->
      <div class="bg-brand-slate border border-white/5 rounded-3xl p-5 mb-4">
        <label class="block font-mono text-[10px] tracking-widest text-brand-muted uppercase mb-2">Or enter code manually</label>
        <div class="flex gap-2">
          <input id="manual-code" type="text" placeholder="EXC-XXXXXX" autocapitalize="characters"
                 class="flex-1 bg-brand-obsidian border border-white/10 rounded-xl focus:border-brand-gold text-brand-ice font-mono text-sm px-4 py-3 outline-none uppercase">
          <button id="manual-go" class="font-mono text-[11px] tracking-widest uppercase rounded-xl px-5 bg-brand-gold text-brand-obsidian font-bold hover:bg-brand-ice transition-colors">Go</button>
        </div>
      </div>

      <!-- Result card -->
      <div id="result" class="hidden bg-brand-slate border rounded-3xl p-6"></div>
    </div>

    <!-- ---------- TABLES TAB ---------- -->
    <div id="tab-tables" class="hidden">
      <div class="flex items-center justify-between mb-4">
        <div class="font-mono text-[10px] tracking-widest text-brand-muted uppercase">Live table board</div>
        <button id="tables-refresh" class="font-mono text-[10px] tracking-widest uppercase text-brand-gold border border-brand-gold/40 rounded-full px-3 py-2 hover:bg-brand-goldDim transition-colors">Refresh</button>
      </div>
      <div id="tables-list" class="space-y-3"></div>
      <div id="tables-empty" class="hidden text-center text-brand-muted text-sm font-light py-10">No tables found.</div>
    </div>

  </div>

  <!-- Supabase JS + QR scanner -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <script>
  (function () {
    'use strict';

    var API_BASE = (window.API_BASE || '').replace(/\/+$/, '');
    var sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

    var $ = function (id) { return document.getElementById(id); };
    var peso = function (n) { return '\u20B1' + Number(n || 0).toLocaleString('en-PH'); };

    // ---- Warm the backend early (Render cold start) ----
    if (API_BASE) { fetch(API_BASE + '/api/availability').catch(function(){}); }

    // ---------------- AUTH ----------------
    async function authHeader() {
      var s = await sb.auth.getSession();
      var token = s && s.data && s.data.session ? s.data.session.access_token : null;
      return token ? { 'Authorization': 'Bearer ' + token } : {};
    }

    function showApp() { $('gate').classList.add('hidden'); $('app').classList.remove('hidden'); }
    function showGate() { $('app').classList.add('hidden'); $('gate').classList.remove('hidden'); }

    async function doLogin() {
      var err = $('gate-error');
      err.classList.add('hidden');
      var email = $('email').value.trim();
      var password = $('password').value;
      if (!email || !password) return;
      $('login-btn').disabled = true; $('login-btn').textContent = 'Logging in\u2026';
      try {
        var res = await sb.auth.signInWithPassword({ email: email, password: password });
        if (res.error) {
          err.textContent = res.error.message || 'Login failed.';
          err.classList.remove('hidden');
        } else {
          showApp();
          loadTables();
        }
      } catch (e) {
        err.textContent = 'Could not reach the auth server.';
        err.classList.remove('hidden');
      } finally {
        $('login-btn').disabled = false; $('login-btn').textContent = 'Log in';
      }
    }
    $('login-btn').addEventListener('click', doLogin);
    $('password').addEventListener('keydown', function (e) { if (e.key === 'Enter') doLogin(); });

    $('logout-btn').addEventListener('click', async function () {
      await sb.auth.signOut();
      stopCamera();
      showGate();
    });

    // Restore session on reload
    sb.auth.getSession().then(function (s) {
      if (s && s.data && s.data.session) { showApp(); loadTables(); }
      else { showGate(); }
    });

    // ---------------- TABS ----------------
    document.querySelectorAll('.tab-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var tab = btn.getAttribute('data-tab');
        document.querySelectorAll('.tab-btn').forEach(function (b) {
          var on = b === btn;
          b.classList.toggle('active-tab', on);
          b.classList.toggle('border-brand-gold', on);
          b.classList.toggle('border-white/10', !on);
          b.classList.toggle('text-brand-muted', !on);
        });
        $('tab-scan').classList.toggle('hidden', tab !== 'scan');
        $('tab-tables').classList.toggle('hidden', tab !== 'tables');
        if (tab === 'tables') loadTables();
        if (tab !== 'scan') stopCamera();
      });
    });

    // ---------------- CAMERA SCANNER ----------------
    var html5Qr = null;
    var scanning = false;
    var lastScan = 0;

    async function startCamera() {
      if (scanning) return;
      $('reader').textContent = '';
      html5Qr = new Html5Qrcode('reader');
      try {
        await html5Qr.start(
          { facingMode: 'environment' },
          { fps: 10, qrbox: { width: 240, height: 240 } },
          onScan,
          function () {}
        );
        scanning = true;
        $('cam-start').classList.add('hidden');
        $('cam-stop').classList.remove('hidden');
      } catch (e) {
        $('reader').textContent = 'Camera unavailable — use manual entry.';
        html5Qr = null;
      }
    }

    async function stopCamera() {
      if (html5Qr && scanning) {
        try { await html5Qr.stop(); await html5Qr.clear(); } catch (e) {}
      }
      scanning = false;
      html5Qr = null;
      $('cam-start').classList.remove('hidden');
      $('cam-stop').classList.add('hidden');
      var r = $('reader'); if (r && !r.querySelector('video')) r.textContent = 'Camera off';
    }

    function onScan(decodedText) {
      var now = Date.now();
      if (now - lastScan < 2500) return;   // debounce repeat fires
      lastScan = now;
      var code = (decodedText || '').trim();
      if (code) { stopCamera(); lookup(code); }
    }

    $('cam-start').addEventListener('click', startCamera);
    $('cam-stop').addEventListener('click', stopCamera);

    // Manual entry
    $('manual-go').addEventListener('click', function () {
      var code = $('manual-code').value.trim();
      if (code) lookup(code);
    });
    $('manual-code').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') { var c = $('manual-code').value.trim(); if (c) lookup(c); }
    });

    // ---------------- LOOKUP ----------------
    async function lookup(code) {
      var box = $('result');
      box.className = 'bg-brand-slate border border-white/10 rounded-3xl p-6';
      box.classList.remove('hidden');
      box.innerHTML = '<div class="text-center text-brand-muted text-sm font-mono py-4">Looking up ' + esc(code) + '\u2026</div>';
      try {
        var headers = await authHeader();
        var res = await fetch(API_BASE + '/api/reception/lookup/' + encodeURIComponent(code.toUpperCase()), { headers: headers });
        if (res.status === 401) { showGate(); return; }
        if (res.status === 404) { renderNotFound(code); return; }
        if (!res.ok) throw new Error('Lookup failed.');
        var b = await res.json();
        renderResult(b);
      } catch (e) {
        box.className = 'bg-brand-slate border border-red-400/40 rounded-3xl p-6';
        box.innerHTML = '<div class="text-center text-red-300 text-sm font-mono py-4">Could not reach the server. Try again.</div>';
      }
    }

    function renderNotFound(code) {
      var box = $('result');
      box.className = 'bg-brand-slate border border-red-400/40 rounded-3xl p-6 text-center';
      box.innerHTML =
        '<div class="w-14 h-14 rounded-full border border-red-400 text-red-300 flex items-center justify-center text-2xl mx-auto mb-3">&times;</div>' +
        '<div class="font-serif text-xl text-brand-ice mb-1">Ticket not found</div>' +
        '<div class="font-mono text-xs text-brand-muted">' + esc(code.toUpperCase()) + ' is not in the guestlist.</div>';
    }

    function renderResult(b) {
      var box = $('result');
      var confirmed = b.status === 'confirmed';
      var already = b.checked_in;
      var table = b.table_id || 'General Admission';

      // border color: green ok, amber already-in, red not-confirmed
      var border = confirmed ? (already ? 'border-amber-400/50' : 'border-emerald-400/50') : 'border-red-400/50';
      box.className = 'bg-brand-slate border ' + border + ' rounded-3xl p-6';

      var statusBadge, banner = '';
      if (!confirmed) {
        statusBadge = '<span class="font-mono text-[10px] tracking-widest uppercase text-red-300 border border-red-400/40 rounded-full px-2 py-1">' + esc(b.status) + '</span>';
        banner = '<div class="bg-red-400/10 border border-red-400/30 rounded-xl p-3 text-red-300 text-xs font-mono text-center mb-4">Not confirmed — do not admit. Refer to admin.</div>';
      } else if (already) {
        statusBadge = '<span class="font-mono text-[10px] tracking-widest uppercase text-amber-300 border border-amber-400/40 rounded-full px-2 py-1">Checked in</span>';
        var t = b.checked_in_at ? new Date(b.checked_in_at).toLocaleTimeString('en-PH', {hour:'2-digit', minute:'2-digit'}) : '';
        banner = '<div class="bg-amber-400/10 border border-amber-400/30 rounded-xl p-3 text-amber-300 text-xs font-mono text-center mb-4">Already checked in' + (t ? ' at ' + t : '') + '. You can update the head count below.</div>';
      } else {
        statusBadge = '<span class="font-mono text-[10px] tracking-widest uppercase text-emerald-300 border border-emerald-400/40 rounded-full px-2 py-1">Confirmed</span>';
      }

      var defaultHeads = (already && b.heads_present) ? b.heads_present : b.guests;

      box.innerHTML =
        banner +
        '<div class="flex items-start justify-between mb-4">' +
          '<div>' +
            '<div class="font-serif text-2xl text-brand-ice leading-tight">' + esc(b.full_name) + '</div>' +
            '<div class="font-mono text-[11px] tracking-widest text-brand-gold uppercase mt-1">' + esc(b.ticket_code || '') + '</div>' +
          '</div>' + statusBadge +
        '</div>' +
        '<div class="grid grid-cols-2 gap-3 font-mono text-xs mb-5">' +
          detail('Package', b.package) +
          detail('Table / Spot', table) +
          detail('Booked pax', String(b.guests)) +
          detail('Boarding', 'Manila Yacht Club') +
        '</div>';

      if (confirmed) {
        box.innerHTML +=
          '<div class="border-t border-white/10 pt-5">' +
            '<div class="font-mono text-[10px] tracking-widest text-brand-muted uppercase mb-3 text-center">Heads present at this table</div>' +
            '<div class="flex items-center justify-center gap-5 mb-5">' +
              '<button id="heads-minus" class="w-12 h-12 rounded-full border border-white/15 text-brand-ice text-2xl leading-none hover:border-brand-gold hover:text-brand-gold transition-colors">&minus;</button>' +
              '<input id="heads-val" type="number" value="' + defaultHeads + '" min="0" max="' + b.guests + '" class="w-16 bg-transparent text-center font-serif text-4xl text-brand-gold outline-none">' +
              '<button id="heads-plus" class="w-12 h-12 rounded-full border border-white/15 text-brand-ice text-2xl leading-none hover:border-brand-gold hover:text-brand-gold transition-colors">+</button>' +
            '</div>' +
            '<button id="checkin-btn" data-id="' + esc(b.id) + '" class="w-full py-4 rounded-full bg-brand-gold text-brand-obsidian font-mono text-xs font-bold tracking-widest uppercase hover:bg-brand-ice transition-colors">' +
              (already ? 'Update head count' : 'Check in guest') +
            '</button>' +
          '</div>';

        wireHeads(b.guests);
        $('checkin-btn').addEventListener('click', function () {
          checkin(b.id, parseInt($('heads-val').value, 10) || 0);
        });
      }
    }

    function wireHeads(maxHeads) {
      var val = $('heads-val');
      $('heads-minus').addEventListener('click', function () {
        var n = (parseInt(val.value, 10) || 0) - 1; if (n < 0) n = 0; val.value = n;
      });
      $('heads-plus').addEventListener('click', function () {
        var n = (parseInt(val.value, 10) || 0) + 1; if (n > maxHeads) n = maxHeads; val.value = n;
      });
    }

    async function checkin(id, heads) {
      var btn = $('checkin-btn');
      btn.disabled = true; btn.textContent = 'Saving\u2026';
      try {
        var headers = await authHeader();
        headers['Content-Type'] = 'application/json';
        var res = await fetch(API_BASE + '/api/reception/checkin/' + encodeURIComponent(id), {
          method: 'POST', headers: headers, body: JSON.stringify({ heads_present: heads })
        });
        if (res.status === 401) { showGate(); return; }
        var data = await res.json().catch(function(){ return {}; });
        if (!res.ok) throw new Error((data && data.detail) || 'Check-in failed.');

        var box = $('result');
        box.className = 'bg-brand-slate border border-emerald-400/60 rounded-3xl p-6 text-center';
        box.innerHTML =
          '<div class="w-16 h-16 rounded-full border border-emerald-400 text-emerald-300 flex items-center justify-center text-3xl mx-auto mb-4">&check;</div>' +
          '<div class="font-serif text-2xl text-brand-ice mb-1">' + esc(data.full_name) + '</div>' +
          '<div class="font-mono text-xs text-brand-muted mb-4">' + (data.table_id ? esc(data.table_id) + ' &middot; ' : '') + esc(String(data.heads_present)) + ' seated</div>' +
          '<button id="scan-again" class="w-full py-3 rounded-full bg-brand-gold text-brand-obsidian font-mono text-xs font-bold tracking-widest uppercase hover:bg-brand-ice transition-colors">Scan next guest</button>';
        $('scan-again').addEventListener('click', function () {
          $('result').classList.add('hidden');
          $('manual-code').value = '';
        });
        loadTables();
      } catch (e) {
        btn.disabled = false; btn.textContent = 'Check in guest';
        alert(e.message);
      }
    }

    // ---------------- TABLE BOARD ----------------
    async function loadTables() {
      var list = $('tables-list');
      try {
        var headers = await authHeader();
        var res = await fetch(API_BASE + '/api/reception/tables', { headers: headers });
        if (res.status === 401) { showGate(); return; }
        var data = await res.json();
        var tables = (data && data.tables) || [];
        if (!tables.length) {
          list.innerHTML = ''; $('tables-empty').classList.remove('hidden'); return;
        }
        $('tables-empty').classList.add('hidden');
        list.innerHTML = tables.map(function (t) {
          var seated = t.seated || 0;
          var booked = t.booked_pax || 0;
          var occupied = t.any_checked_in;
          var accent = occupied ? 'border-emerald-400/40' : 'border-white/10';
          var who = (t.reserved_by && t.reserved_by.length) ? t.reserved_by.map(esc).join(', ') : 'Unreserved';
          return '' +
            '<div class="bg-brand-slate border ' + accent + ' rounded-2xl p-4 flex items-center justify-between">' +
              '<div>' +
                '<div class="font-serif text-lg text-brand-ice">' + esc(t.id) + '</div>' +
                '<div class="font-mono text-[10px] tracking-widest text-brand-muted uppercase mt-1">' + esc(t.package || '') + '</div>' +
                '<div class="text-xs text-brand-muted font-light mt-1">' + who + '</div>' +
              '</div>' +
              '<div class="text-right">' +
                '<div class="font-serif text-2xl ' + (occupied ? 'text-emerald-300' : 'text-brand-muted') + '">' + seated + '</div>' +
                '<div class="font-mono text-[10px] tracking-widest text-brand-muted uppercase">of ' + booked + ' booked</div>' +
              '</div>' +
            '</div>';
        }).join('');
      } catch (e) {
        list.innerHTML = '<div class="text-center text-brand-muted text-sm font-mono py-6">Could not load tables.</div>';
      }
    }
    $('tables-refresh').addEventListener('click', loadTables);

    // ---------------- utils ----------------
    function detail(label, value) {
      return '<div class="bg-brand-obsidian/40 border border-white/5 rounded-xl p-3">' +
        '<div class="text-brand-muted uppercase tracking-widest text-[9px] mb-1">' + label + '</div>' +
        '<div class="text-brand-ice">' + esc(value == null ? '\u2014' : value) + '</div></div>';
    }
    function esc(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
        return ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[c];
      });
    }
  })();
  </script>
</body>
</html>
